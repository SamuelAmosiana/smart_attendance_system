# ============================================================
# render.yaml — Render Blueprint (Docker + Managed Postgres DB)
# ============================================================
# Render creates BOTH the web service AND the database.
# No external provider needed — just connect your GitHub repo
# and click "Apply Blueprint".
# ============================================================

databases:
  - name: smart-attendance-db       # Internal Render reference name
    databaseName: smart_attendance_db
    user: smart_attendance_user
    plan: free                      # Free tier (90-day expiry — upgrade for production)

services:
  - type: web
    name: smart-attendance
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon                  # Change to "frankfurt" for EU

    healthCheckPath: /

    envVars:
      # Flask secret key — auto-generated by Render
      - key: SECRET_KEY
        generateValue: true

      # DATABASE_URL is automatically injected from the DB above
      # Format: postgresql://user:pass@host:port/dbname
      - key: DATABASE_URL
        fromDatabase:
          name: smart-attendance-db
          property: connectionString

      - key: FLASK_DEBUG
        value: "false"

      - key: PORT
        value: "10000"
