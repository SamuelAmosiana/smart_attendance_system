# ============================================================
# render.yaml — Render Blueprint (Docker-based)
# ============================================================
# Deploy this project as a Render Blueprint by connecting your
# GitHub repo and selecting this file.
#
# Services defined here:
#   1. smart-attendance  — Python/Flask web service (Docker)
#
# Database: Connect an EXTERNAL MySQL provider (e.g. Aiven,
# PlanetScale, Railway, or Render MySQL add-on) and fill in
# the DB_* environment variables below.
# ============================================================

services:
  - type: web
    name: smart-attendance
    runtime: docker               # ← Use Docker instead of native Python
    dockerfilePath: ./Dockerfile  # Path to the Dockerfile
    plan: free                    # Use "starter" for paid tier
    region: oregon                # Change to "frankfurt" for EU

    # ── Health check ────────────────────────────────────────
    healthCheckPath: /

    # ── Environment variables ────────────────────────────────
    envVars:
      # Flask secret key — auto-generated by Render on first deploy
      - key: SECRET_KEY
        generateValue: true

      # ── Database credentials ─────────────────────────────
      # Fill these in the Render dashboard after deploying,
      # or use a fromService reference if using Render MySQL.
      - key: DB_HOST
        sync: false               # Set manually in dashboard

      - key: DB_PORT
        value: "3306"

      - key: DB_USER
        sync: false               # Set manually in dashboard

      - key: DB_PASSWORD
        sync: false               # Set manually in dashboard

      - key: DB_NAME
        sync: false               # Set manually in dashboard

      # ── Optional: SSL certificate path for Aiven ─────────
      # Upload the ca.pem to your repo or mount it via Render
      # secret files, then set this variable to the file path.
      - key: DB_SSL_CA
        sync: false               # Leave blank if not using SSL

      # ── Flask settings ───────────────────────────────────
      - key: FLASK_DEBUG
        value: "false"

      # ── Gunicorn port (Render overrides this at runtime) ──
      - key: PORT
        value: "10000"
