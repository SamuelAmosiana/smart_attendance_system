services:
  - type: web
    name: smart-attendance
    runtime: python
    buildCommand: |
      apt-get install -y cmake build-essential libopenblas-dev liblapack-dev libx11-dev libgtk-3-dev && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: FLASK_DEBUG
        value: false
    healthCheckPath: /
